<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="styles.css">
        <title>William Lewsey</title>
    </head>
    <body>

        <main id="content">

            <script>

                const textIdentity = "Name: William Lewsey\nOccupation: Game Developer\nPhysical Status: Healthy\nMental Status: Stable\n\nVisage Capture:";
                const textHumour1 = "Looking good.";

                const textSummary = "Making games alone, I have a hand in many aspects of both design and development.";
                const textSection3 = "Test";

                function introPhoto(src, width, height) {
                    const imgIntroPhoto = document.createElement("img");
                    imgIntroPhoto.src = src;
                    imgIntroPhoto.width = width;
                    imgIntroPhoto.height = height;
                    document.body.appendChild(imgIntroPhoto);
                }


                function typeText(id, text, speed, callback) {
                    const p = document.createElement("p");
                    p.id = id;

                    const pre = document.createElement("pre");
                    pre.appendChild(p);
                    document.body.appendChild(pre);

                    let i = 0;

                    function type() {
                        if (i < text.length) {
                            p.textContent += text.charAt(i++);
                            setTimeout(type, speed);
                        } else if (callback) {
                            callback();
                        }
                    }

                    type();
                }

                typeText("identity", textIdentity, 10, () => {
                    introPhoto("imSoGreen.png", 200, 200);

                    setTimeout(() => {
                        typeText("humour", textHumour1, 10, () => {
                            setTimeout(() => {
                                typeText("summary", textSummary, 10, () => {
                                    setTimeout(() => {
                                        typeText("section3", textSection3, 10);
                                    }, 500);
                                });
                            }, 1000);
                        });
                    }, 1000);
                });

            </script>
        </main>
    </body>
</html>
