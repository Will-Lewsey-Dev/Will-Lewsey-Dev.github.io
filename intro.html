<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>William Lewsey</title>
</head>
<body onload="introIdentity()">

    <script>
        let textIdentityBuilt = false;
        let textHumour1Built = false;
        let textSkillsBuilt = false;
        let textSection3Built = false;

        const textIdentity = "Name: William Lewsey\nOccupation: Game Developer\nPhysical Status: Healthy\nMental Status: Stable\n\nVisage Capture:";
        const textHumour1 = "Looking good."
        const textSkills = "Hello";
        const textSection3 = "Test";
        
        let i = 0;
        let speed = 10;
        //let audio = new Audio("untitled.mp3");

        function introSection3() {
            if (textSection3Built == false) {
                const pre = document.createElement("pre");
                const p = document.createElement("p");
                p.id = "introText3";
                pre.appendChild(p);
                document.body.appendChild(pre);
                textSection3Built = true;
                introSection3();
            } else {
                if (i < textSection3.length) {
                    document.getElementById("introText3").textContent += textSection3.charAt(i);
                    i++;
                    //audio.play();
                    setTimeout(introSection3, speed);
                }
            }
        }

        function introSkills() {
            if (textSkillsBuilt == false) {
                const preIntroSkills = document.createElement("pre");
                const pIntroSkills = document.createElement("p");
                pIntroSkills.id = "idIntroSkills";
                preIntroSkills.appendChild(pIntroSkills);
                document.body.appendChild(preIntroSkills);
                textSkillsBuilt = true;
                introSkills();
            } else {
                if (i < textSkills.length) {
                    document.getElementById("idIntroSkills").textContent += textSkills.charAt(i);
                    i++;
                    //audio.play();
                    setTimeout(introSkills, speed);
                } else {
                    i = 0;
                    setTimeout(introSection3, 500);
                }
            }
        }

        function introHumour1() {
            if (textHumour1Built == false) {
                const preIntroHumour1 = document.createElement("pre");
                const pIntroHumour1 = document.createElement("p");
                pIntroHumour1.id = "idIntroHumour1";
                preIntroHumour1.appendChild(pIntroHumour1);
                document.body.appendChild(preIntroHumour1);
                textHumour1Built = true;
                introHumour1();
            } else {
                if (i < textHumour1.length) {
                    document.getElementById("idIntroHumour1").textContent += textHumour1.charAt(i);
                    i++;
                    //audio.play();
                    setTimeout(introHumour1, speed);
                } else {
                    i = 0;
                    setTimeout(introSkills, 1000);
                }
            }
        }

        function introPhoto(src, width, height) {
            const imgIntroPhoto = document.createElement("img");
            imgIntroPhoto.src = src;
            imgIntroPhoto.width = width;
            imgIntroPhoto.height = height;
            document.body.appendChild(imgIntroPhoto);

            // Create image
            const preIntroPhoto = document.createElement("pre");
            const pIntroPhoto = document.createElement("p");
            pIntroPhoto.id = "idIntroPhoto";
            preIntroPhoto.appendChild(pIntroPhoto);
            document.body.appendChild(preIntroPhoto);

            i = 0;
            setTimeout(introHumour1, 1000);
        }

        function introIdentity() {
            // Create first text
            if (textIdentityBuilt == false) {
                const preIntroIdentity = document.createElement("pre");
                const pIntroIdentity = document.createElement("p");
                pIntroIdentity.id = "idIntroIdentity";
                preIntroIdentity.appendChild(pIntroIdentity);
                document.body.appendChild(preIntroIdentity);
                textIdentityBuilt = true;
                introIdentity();
            } else {
                if (i < textIdentity.length) {
                    document.getElementById("idIntroIdentity").textContent += textIdentity.charAt(i);
                    i++;
                    //audio.play();
                    setTimeout(introIdentity, speed);
                } else {
                    setTimeout(introPhoto, 500, "imSoGreen.png", 200, 200);
                }
            }
            
        } 

    </script>

</body>
</html>
