<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="styles.css">
        <title>William Lewsey</title>
    </head>
    <body>
        <script>

            const textIdentity = "Name: William Lewsey\nOccupation: Game Developer\nPhysical Status: Healthy\nMental Status: Stable\n\nVisage Capture:";
            const textHumour1 = "Looking good.";

            const textSummary = "Making games alone, I have a hand in many aspects of both design and development.";
            const textSection3 = "Test";

            function wait(ms) {
                return new Promise(resolve => setTimeout(resolve, ms));
            }

            function introPhoto(src, width, height) {
                const imgIntroPhoto = document.createElement("img");
                imgIntroPhoto.src = src;
                imgIntroPhoto.width = width;
                imgIntroPhoto.height = height;
                document.body.appendChild(imgIntroPhoto);
            }

            function typeText(id, text, speed) {
                return new Promise(resolve => {
                    const pre = document.createElement("pre");
                    pre.id = id;
                    pre.classList.add("typing");
                    document.body.appendChild(pre);

                    let i = 0;

                    function type() {
                        if (i < text.length) {
                            pre.textContent += text.charAt(i);
                            i++;
                            setTimeout(type, speed);
                        } else {
                            pre.classList.remove("typing");
                            resolve();
                        }
                    }

                    type();
                });
            }

            async function startIntro() {
                await typeText("identity", textIdentity, 10);

                introPhoto("imSoGreen.webp", 200, 200);

                await wait(1000);

                await typeText("humour", textHumour1, 10);

                await wait(1000);

                await typeText("summary", textSummary, 10);

                await wait(500);

                await typeText("section3", textSection3, 10);
            }

            startIntro();
        </script>
    </body>
</html>
